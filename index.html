<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMaster Pro - Intelligence Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Prata&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Rubik', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .heading { font-family: 'Prata', serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass { background: rgba(30, 41, 59, 0.85); }

        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .task-card { transition: all 0.2s ease; border-right: 4px solid transparent; }
        .overdue-card { background-color: #fef2f2 !important; border-right-color: #dc2626 !important; }
        
        .priority-1 { border-right-color: #ef4444; }
        .priority-2 { border-right-color: #f97316; }
        .priority-3 { border-right-color: #3b82f6; }

        .active-nav { background-color: #4f46e5 !important; color: white !important; }
        input, select, textarea { font-size: 16px !important; }

        #main-content-scroll {
            height: calc(100vh - 5rem);
            overflow-y: auto;
            padding-bottom: 10rem;
        }
        .select-none { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-gray-800 transition-colors duration-300">

    <input type="file" id="json-file-input" accept=".json" class="hidden">

    <div id="auth-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/95 backdrop-blur-md">
        <div class="max-w-md w-full text-center">
            <div class="mb-10">
                <div class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center text-4xl shadow-2xl mx-auto mb-6">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h1 class="text-3xl font-bold text-white heading mb-2">TaskMaster Pro</h1>
                <p class="text-slate-400">בחר פרופיל עבודה</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="app.loginAs('user')" class="bg-white p-6 rounded-3xl shadow-xl cursor-pointer hover:scale-105 transition-all select-none">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-user-tie"></i></div>
                    <h3 class="font-bold">פרופיל אישי</h3>
                </div>
                <div onclick="app.loginAs('wife')" class="bg-white p-6 rounded-3xl shadow-xl cursor-pointer hover:scale-105 transition-all select-none">
                    <div class="w-16 h-16 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-user-astronaut"></i></div>
                    <h3 class="font-bold">פרופיל אשתי</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex h-screen w-full overflow-hidden hidden">
        
        <aside id="sidebar" class="bg-white dark:bg-slate-800 w-72 flex-shrink-0 border-l border-gray-200 dark:border-slate-700 fixed md:relative inset-y-0 right-0 transform translate-x-full md:translate-x-0 flex flex-col shadow-2xl md:shadow-none">
            <div class="h-20 flex items-center justify-between px-8 border-b dark:border-slate-700">
                <span class="text-2xl font-extrabold text-indigo-600 heading tracking-tight">TaskMaster</span>
                <button onclick="app.toggleSidebar()" class="md:hidden text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <div class="mb-6 px-4 py-3 bg-slate-50 dark:bg-slate-700 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">משתמש מחובר:</p>
                    <div class="flex items-center gap-3">
                        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-bold"></div>
                        <span id="user-display-name" class="font-bold text-sm dark:text-white"></span>
                    </div>
                </div>

                <button onclick="app.setFilter('all')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-700 transition-all nav-item" id="nav-all">
                    <i class="fa-solid fa-layer-group"></i> כל המשימות
                </button>

                <div class="pt-6">
                    <div class="flex items-center justify-between px-4 mb-2">
                        <p class="text-xs font-bold text-slate-400 uppercase">קטגוריות</p>
                        <button onclick="app.openCategoryModal()" class="text-indigo-500 hover:scale-110 transition-transform"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div id="sidebar-categories" class="space-y-1"></div>
                </div>

                <div class="pt-10 border-t dark:border-slate-700 mt-6">
                    <button onclick="app.exportTasks()" class="w-full flex items-center gap-3 px-4 py-2 text-xs text-slate-400 hover:text-indigo-500 transition-colors"><i class="fa-solid fa-download"></i> ייצוא JSON</button>
                    <button onclick="document.getElementById('json-file-input').click()" class="w-full flex items-center gap-3 px-4 py-2 text-xs text-slate-400 hover:text-indigo-500 transition-colors"><i class="fa-solid fa-upload"></i> טעינת JSON</button>
                </div>
            </nav>
            <div class="p-4"><button onclick="app.logout()" class="w-full py-3 text-red-500 text-sm font-bold">החלף פרופיל</button></div>
        </aside>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="app.toggleSidebar()"></div>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <header class="h-20 flex-shrink-0 glass flex items-center justify-between px-4 md:px-6 sticky top-0 z-20">
                <div class="flex items-center gap-3 flex-1 max-w-xl">
                    <button onclick="app.toggleSidebar()" class="md:hidden text-slate-600 dark:text-white p-2"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="text" id="search-input" oninput="app.renderTasks()" placeholder="חיפוש משימה..." class="w-full bg-slate-100 dark:bg-slate-800 dark:text-white border-none rounded-2xl py-2.5 pr-10 pl-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4 mr-2">
                    <div class="hidden sm:flex bg-slate-100 dark:bg-slate-700 p-1 rounded-xl">
                        <button onclick="app.setViewMode('grid')" id="btn-grid" class="w-9 h-9 rounded-lg flex items-center justify-center transition-all bg-white text-indigo-600 shadow-sm"><i class="fa-solid fa-grip"></i></button>
                        <button onclick="app.setViewMode('list')" id="btn-list" class="w-9 h-9 rounded-lg flex items-center justify-center transition-all text-slate-400"><i class="fa-solid fa-list-ul"></i></button>
                    </div>
                    <button onclick="app.openTaskModal()" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:scale-105 active:scale-95 transition-all select-none">+ חדש</button>
                </div>
            </header>

            <div id="main-content-scroll" class="px-4 md:px-8 py-6">
                <div class="grid grid-cols-3 gap-3 md:gap-6 mb-8">
                    <button onclick="app.setFilter('all')" class="bg-white dark:bg-slate-800 p-4 md:p-5 rounded-2xl shadow-sm border dark:border-slate-700 hover:border-indigo-500 transition-all group">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 group-hover:text-indigo-500">סה"כ</p>
                        <h3 id="stat-total" class="text-2xl font-bold dark:text-white">0</h3>
                    </button>
                    <button onclick="app.setFilter('active')" class="bg-white dark:bg-slate-800 p-4 md:p-5 rounded-2xl shadow-sm border-b-4 border-orange-500 hover:bg-orange-50 dark:hover:bg-orange-950/20 transition-all group">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 group-hover:text-orange-500">פעיל</p>
                        <h3 id="stat-active" class="text-2xl font-bold dark:text-white">0</h3>
                    </button>
                    <button onclick="app.setFilter('completed')" class="bg-white dark:bg-slate-800 p-4 md:p-5 rounded-2xl shadow-sm border-b-4 border-green-500 hover:bg-green-50 dark:hover:bg-green-950/20 transition-all group">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 group-hover:text-green-500">בוצע</p>
                        <h3 id="stat-completed" class="text-2xl font-bold dark:text-white">0</h3>
                    </button>
                </div>

                <div id="tasks-container"></div>
                <div id="empty-state" class="hidden py-32 text-center text-slate-400 opacity-40"><i class="fa-solid fa-face-smile text-6xl mb-4"></i><p class="text-xl">אין משימות שעונות על החיפוש</p></div>
            </div>

            <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t dark:border-slate-700 px-6 py-4 flex justify-between items-center z-30">
                <button onclick="app.setFilter('all')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fa-solid fa-house"></i><span class="text-[10px]">ראשי</span></button>
                <button onclick="app.setFilter('active')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fa-solid fa-bolt"></i><span class="text-[10px]">פעיל</span></button>
                <div class="w-10"></div>
                <button onclick="app.setFilter('completed')" class="flex flex-col items-center gap-1 text-slate-400"><i class="fa-solid fa-check-double"></i><span class="text-[10px]">בוצע</span></button>
                <button onclick="app.toggleTheme()" class="flex flex-col items-center gap-1 text-slate-400"><i class="fa-solid fa-moon"></i><span class="text-[10px]">עיצוב</span></button>
            </nav>
            <button onclick="app.openTaskModal()" class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-xl z-40"><i class="fa-solid fa-plus"></i></button>
        </main>
    </div>

    <div id="task-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="app.closeTaskModal()"></div>
        <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-3xl shadow-2xl relative z-10 overflow-hidden text-right">
            <div class="p-6 border-b dark:border-slate-700 flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-lg dark:text-white heading">משימה חדשה</h3>
                <button onclick="app.closeTaskModal()" class="text-slate-400"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="task-form" onsubmit="app.saveTask(event)" class="p-6 space-y-4">
                <input type="hidden" id="task-id">
                <input type="text" id="task-title" placeholder="מה המשימה?" required class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <textarea id="task-desc" placeholder="פירוט (אופציונלי)..." rows="2" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <select id="task-category" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none cursor-pointer"></select>
                    <select id="task-priority" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none cursor-pointer">
                        <option value="3">🔵 עדיפות רגילה</option>
                        <option value="2">🟠 עדיפות גבוהה</option>
                        <option value="1">🔴 עדיפות דחופה</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">תאריך יעד</label>
                    <input type="date" id="task-date" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none cursor-pointer">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all select-none">שמור שינויים</button>
            </form>
        </div>
    </div>

    <div id="category-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="app.closeCategoryModal()"></div>
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl relative z-10 p-6 text-right">
            <h3 class="text-xl font-bold dark:text-white mb-6 heading">ניהול קטגוריה</h3>
            <input type="hidden" id="edit-cat-id">
            <div class="space-y-5">
                <input type="text" id="cat-name-input" placeholder="שם הקטגוריה" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
                
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-2">בחירת צבע</label>
                    <div class="flex items-center gap-4">
                        <input type="color" id="cat-color-picker" class="w-12 h-12 rounded-lg cursor-pointer bg-transparent border-none">
                        <div id="color-palette" class="grid grid-cols-5 gap-2 flex-1"></div>
                    </div>
                </div>

                <div class="pt-4 flex flex-col gap-2">
                    <button onclick="app.saveCategory()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-md select-none">שמור קטגוריה</button>
                    <button onclick="app.deleteCategory()" id="btn-delete-cat" class="hidden text-red-500 py-2 font-bold text-sm hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all">מחק קטגוריה</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnTW2iN51IrUxinwojc4BGEzn5gQSDKBI",
            authDomain: "task-manager-109e0.firebaseapp.com",
            projectId: "task-manager-109e0",
            storageBucket: "task-manager-109e0.firebasestorage.app",
            messagingSenderId: "489374964203",
            appId: "1:489374964203:web:7b09fd97bc9f9b7d5021ae",
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        const auth = getAuth(fApp);
        const artifactId = 'task-manager-109e0';

        const appState = { 
            profile: null, tasks: [], categories: [], filter: 'all', viewMode: 'grid',
            palette: ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#10b981', '#06b6d4', '#3b82f6', '#64748b'], 
            selectedColor: '#6366f1', listeners: [] 
        };

        const app = {
            async loginAs(profile) {
                appState.profile = profile;
                try {
                    await signInAnonymously(auth);
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    this.updateProfileUI(profile);
                    this.startSync();
                } catch (e) { Swal.fire('שגיאה', 'בדוק את חיבור ה-Internet ו-Anonymous Auth ב-Firebase.', 'error'); }
            },

            updateProfileUI(p) {
                const isUser = p === 'user', av = document.getElementById('user-avatar');
                av.className = `w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shadow-sm ${isUser ? 'bg-blue-500' : 'bg-pink-500'}`;
                av.innerHTML = isUser ? '<i class="fa-solid fa-user-tie"></i>' : '<i class="fa-solid fa-user-astronaut"></i>';
                document.getElementById('user-display-name').innerText = isUser ? "שובל" : "הני";
            },

            startSync() {
                appState.listeners.forEach(unsub => unsub());
                const pathBase = `artifacts/${artifactId}/users/${appState.profile}`;
                
                appState.listeners.push(onSnapshot(collection(db, `${pathBase}/categories`), snap => {
                    appState.categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (appState.categories.length === 0) this.seedInitialCategories();
                    this.renderSidebarCategories();
                    this.renderTasks();
                }));

                appState.listeners.push(onSnapshot(collection(db, `${pathBase}/tasks`), snap => {
                    appState.tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.renderStats();
                    this.renderTasks();
                }));
            },

            async seedInitialCategories() {
                const batch = writeBatch(db);
                [{ name: 'עבודה', color: '#6366f1' }, { name: 'אישי', color: '#10b981' }, { name: 'דחוף', color: '#ef4444' }].forEach(c => batch.set(doc(collection(db, `artifacts/${artifactId}/users/${appState.profile}/categories`)), c));
                await batch.commit();
            },

            formatDisplayDate(dateStr) {
                if (!dateStr) return 'ללא יעד';
                const date = new Date(dateStr);
                const today = new Date().setHours(0,0,0,0);
                const target = date.setHours(0,0,0,0);
                
                if (today === target) return 'היום';
                return date.toLocaleDateString('he-IL', { day: 'numeric', month: 'short' });
            },

            renderTasks() {
                const container = document.getElementById('tasks-container');
                const search = document.getElementById('search-input').value.toLowerCase();
                container.innerHTML = '';
                
                const filtered = appState.tasks.filter(t => {
                    const matchesSearch = t.title.toLowerCase().includes(search) || (t.description || '').toLowerCase().includes(search);
                    if (appState.filter === 'active') return matchesSearch && !t.completed;
                    if (appState.filter === 'completed') return matchesSearch && t.completed;
                    if (appState.filter !== 'all') return matchesSearch && t.categoryId === appState.filter;
                    return matchesSearch;
                }).sort((a,b) => a.priority - b.priority);

                document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);
                
                container.className = appState.viewMode === 'grid' 
                    ? 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' 
                    : 'flex flex-col gap-3 max-w-4xl mx-auto';

                const now = new Date().setHours(0,0,0,0);

                filtered.forEach(task => {
                    const cat = appState.categories.find(c => c.id === task.categoryId) || { name: 'כללי', color: '#94a3b8' };
                    const isOverdue = task.dueDate && new Date(task.dueDate) < now && !task.completed;
                    const displayDate = this.formatDisplayDate(task.dueDate);

                    const card = document.createElement('div');
                    card.className = `task-card bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-sm border dark:border-slate-700 relative priority-${task.priority} ${task.completed ? 'opacity-50 grayscale-[0.5]' : ''} ${isOverdue ? 'overdue-card ring-2 ring-red-500/20' : ''}`;
                    
                    if (appState.viewMode === 'grid') {
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-3">
                                <div onclick="app.toggleComplete('${task.id}', ${task.completed})" class="w-6 h-6 border-2 rounded-xl cursor-pointer flex items-center justify-center transition-all ${task.completed ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 dark:border-slate-600 hover:border-indigo-500'}">
                                    ${task.completed ? '<i class="fa-solid fa-check text-xs"></i>' : ''}
                                </div>
                                <div class="flex gap-3 text-slate-300 dark:text-slate-600">
                                    <button onclick="app.openTaskModal('${task.id}')" class="hover:text-indigo-500"><i class="fa-solid fa-pen-to-square text-sm"></i></button>
                                    <button onclick="app.deleteTask('${task.id}')" class="hover:text-red-500"><i class="fa-solid fa-trash-can text-sm"></i></button>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 mb-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:${cat.color}"></span><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">${cat.name}</span></div>
                            <h4 class="font-bold text-lg dark:text-white leading-tight ${task.completed ? 'line-through text-slate-400' : ''}">${task.title}</h4>
                            <p class="text-[11px] mt-2 flex items-center gap-1.5 font-bold ${isOverdue ? 'text-red-600' : 'text-indigo-500'}">
                                <i class="fa-solid ${isOverdue ? 'fa-triangle-exclamation animate-pulse' : 'fa-calendar-day'}"></i>
                                ${displayDate} ${isOverdue ? '(בפיגור!)' : ''}
                            </p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-3 line-clamp-2 leading-relaxed">${task.description || ''}</p>
                        `;
                    } else {
                        card.className += " flex items-center gap-4 py-3 px-6";
                        card.innerHTML = `
                            <div onclick="app.toggleComplete('${task.id}', ${task.completed})" class="w-6 h-6 border-2 rounded-xl cursor-pointer flex-shrink-0 flex items-center justify-center ${task.completed ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300'}">
                                ${task.completed ? '<i class="fa-solid fa-check text-xs"></i>' : ''}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-sm dark:text-white truncate ${task.completed ? 'line-through text-slate-400' : ''}">${task.title}</h4>
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-bold" style="color:${cat.color}">${cat.name}</span>
                                    <span class="text-[10px] font-bold ${isOverdue ? 'text-red-600' : 'text-slate-400'}">${displayDate}</span>
                                </div>
                            </div>
                            <div class="flex gap-4 text-slate-300">
                                <button onclick="app.openTaskModal('${task.id}')" class="hover:text-indigo-500"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="app.deleteTask('${task.id}')" class="hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `;
                    }
                    container.appendChild(card);
                });
            },

            setViewMode(mode) {
                appState.viewMode = mode;
                document.getElementById('btn-grid').className = mode === 'grid' ? 'w-9 h-9 rounded-lg flex items-center justify-center transition-all bg-white text-indigo-600 shadow-sm' : 'w-9 h-9 rounded-lg flex items-center justify-center transition-all text-slate-400';
                document.getElementById('btn-list').className = mode === 'list' ? 'w-9 h-9 rounded-lg flex items-center justify-center transition-all bg-white text-indigo-600 shadow-sm' : 'w-9 h-9 rounded-lg flex items-center justify-center transition-all text-slate-400';
                this.renderTasks();
            },

            async toggleComplete(id, current) {
                await updateDoc(doc(db, `artifacts/${artifactId}/users/${appState.profile}/tasks`, id), { completed: !current });
            },

            async saveTask(e) {
                e.preventDefault();
                const id = document.getElementById('task-id').value;
                const data = {
                    title: document.getElementById('task-title').value.trim(),
                    description: document.getElementById('task-desc').value.trim(),
                    categoryId: document.getElementById('task-category').value,
                    priority: parseInt(document.getElementById('task-priority').value),
                    dueDate: document.getElementById('task-date').value,
                    updatedAt: Date.now()
                };
                const col = collection(db, `artifacts/${artifactId}/users/${appState.profile}/tasks`);
                if (id) await updateDoc(doc(db, `artifacts/${artifactId}/users/${appState.profile}/tasks`, id), data);
                else await addDoc(col, { ...data, completed: false, createdAt: Date.now() });
                this.closeTaskModal();
            },

            async deleteTask(id) {
                const res = await Swal.fire({ title: 'למחוק משימה?', icon: 'warning', showCancelButton: true, confirmButtonText: 'מחק', cancelButtonText: 'בטל', confirmButtonColor: '#ef4444' });
                if (res.isConfirmed) await deleteDoc(doc(db, `artifacts/${artifactId}/users/${appState.profile}/tasks`, id));
            },

            renderSidebarCategories() {
                const container = document.getElementById('sidebar-categories');
                container.innerHTML = '';
                appState.categories.forEach(cat => {
                    const btn = document.createElement('div');
                    btn.className = `group flex items-center justify-between px-4 py-2.5 text-sm rounded-2xl cursor-pointer transition-all ${appState.filter === cat.id ? 'active-nav shadow-md' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'}`;
                    btn.onclick = () => { appState.filter = cat.id; this.renderTasks(); this.renderSidebarCategories(); if(window.innerWidth < 768) this.toggleSidebar(); };
                    btn.innerHTML = `<div class="flex items-center gap-3"><span class="w-2.5 h-2.5 rounded-full shadow-sm" style="background:${cat.color}"></span><span class="font-medium">${cat.name}</span></div>
                    <i onclick="event.stopPropagation(); app.openCategoryModal('${cat.id}')" class="fa-solid fa-ellipsis-vertical text-[10px] opacity-0 group-hover:opacity-100 p-1"></i>`;
                    container.appendChild(btn);
                });
                document.getElementById('task-category').innerHTML = appState.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            },

            async saveCategory() {
                const id = document.getElementById('edit-cat-id').value;
                const name = document.getElementById('cat-name-input').value.trim();
                const color = document.getElementById('cat-color-picker').value;
                if (!name) return;
                const path = `artifacts/${artifactId}/users/${appState.profile}/categories`;
                if (id) await updateDoc(doc(db, path, id), { name, color });
                else await addDoc(collection(db, path), { name, color });
                this.closeCategoryModal();
            },

            async deleteCategory() {
                const id = document.getElementById('edit-cat-id').value;
                const res = await Swal.fire({ title: 'למחוק קטגוריה?', text: 'הפעולה תמחק את כל המשימות המשויכות אליה!', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
                if (res.isConfirmed) { await deleteDoc(doc(db, `artifacts/${artifactId}/users/${appState.profile}/categories`, id)); this.closeCategoryModal(); }
            },

            renderPalette() {
                const pal = document.getElementById('color-palette');
                pal.innerHTML = appState.palette.map(c => `<div onclick="document.getElementById('cat-color-picker').value='${c}'" class="w-6 h-6 rounded-full cursor-pointer border dark:border-slate-600" style="background:${c}"></div>`).join('');
            },

            openTaskModal(tid = null) {
                document.getElementById('task-modal').classList.remove('hidden');
                if (tid) {
                    const t = appState.tasks.find(x => x.id === tid);
                    document.getElementById('task-id').value = t.id;
                    document.getElementById('task-title').value = t.title;
                    document.getElementById('task-desc').value = t.description;
                    document.getElementById('task-priority').value = t.priority;
                    document.getElementById('task-category').value = t.categoryId;
                    document.getElementById('task-date').value = t.dueDate || '';
                } else { document.getElementById('task-form').reset(); document.getElementById('task-id').value = ''; }
            },
            closeTaskModal() { document.getElementById('task-modal').classList.add('hidden'); },
            openCategoryModal(cid = null) {
                document.getElementById('category-modal').classList.remove('hidden');
                this.renderPalette();
                if (cid) {
                    const c = appState.categories.find(x => x.id === cid);
                    document.getElementById('edit-cat-id').value = c.id;
                    document.getElementById('cat-name-input').value = c.name;
                    document.getElementById('cat-color-picker').value = c.color;
                    document.getElementById('btn-delete-cat').classList.remove('hidden');
                } else {
                    document.getElementById('cat-name-input').value = '';
                    document.getElementById('edit-cat-id').value = '';
                    document.getElementById('cat-color-picker').value = appState.palette[0];
                    document.getElementById('btn-delete-cat').classList.add('hidden');
                }
            },
            closeCategoryModal() { document.getElementById('category-modal').classList.add('hidden'); },
            setFilter(f) { appState.filter = f; this.renderTasks(); this.renderSidebarCategories(); },
            toggleTheme() { document.documentElement.classList.toggle('dark'); },
            toggleSidebar() {
                const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebar-overlay'), isH = sb.classList.contains('translate-x-full');
                sb.classList.toggle('translate-x-full', !isH); ov.classList.toggle('hidden', !isH);
            },
            renderStats() {
                const t = appState.tasks.length, c = appState.tasks.filter(x => x.completed).length;
                document.getElementById('stat-total').innerText = t;
                document.getElementById('stat-active').innerText = t - c;
                document.getElementById('stat-completed').innerText = c;
            },
            flashSync() {
                const i = document.getElementById('sync-indicator');
                i.classList.remove('hidden'); setTimeout(() => i.classList.add('hidden'), 1000);
            },
            exportTasks() {
                const b = new Blob([JSON.stringify({ tasks: appState.tasks, categories: appState.categories })], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `backup_${appState.profile}.json`; a.click();
            },
            logout() { location.reload(); }
        };

        window.app = app;
        document.getElementById('json-file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const data = JSON.parse(ev.target.result);
                const res = await Swal.fire({ title: 'ייבוא נתונים', text: 'האם להחליף הכל או למזג?', icon: 'question', showCancelButton: true, confirmButtonText: 'החלף', cancelButtonText: 'מזג' });
                
                Swal.fire({ title: 'מבצע ייבוא...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    const path = `artifacts/${artifactId}/users/${appState.profile}/tasks`;
                    if (res.isConfirmed) {
                        const snap = await getDocs(collection(db, path));
                        for (const d of snap.docs) await deleteDoc(d.ref);
                    }
                    for (let i = 0; i < data.tasks.length; i += 500) {
                        const batch = writeBatch(db);
                        data.tasks.slice(i, i + 500).forEach(t => {
                            const nt = {...t}; delete nt.id;
                            batch.set(doc(collection(db, path)), nt);
                        });
                        await batch.commit();
                    }
                    Swal.fire('הצלחה!', 'הנתונים יובאו.', 'success');
                } catch(e) { Swal.fire('שגיאה', 'הייבוא נכשל.', 'error'); }
            };
            reader.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
